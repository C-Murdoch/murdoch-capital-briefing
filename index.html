<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murdoch Capital - Morning Briefing</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Instrument Serif', serif;
            color: #253551;
            background-color: #E0E0DB;
            padding: 60px 20px;
            line-height: 1.8;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #E0E0DB;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
            padding-bottom: 40px;
            border-bottom: 1px solid #253551;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        #briefing-content {
            padding: 40px 0;
        }

        #briefing-content h1 {
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 20px;
            letter-spacing: 0.3px;
        }

        .briefing-date {
            font-size: 14px;
            font-style: italic;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        #briefing-content h2 {
            font-size: 18px;
            font-weight: 400;
            margin-top: 40px;
            margin-bottom: 20px;
            letter-spacing: 0.2px;
            border-top: 1px solid #253551;
            padding-top: 20px;
        }

        #briefing-content h2:first-child {
            border-top: none;
            padding-top: 0;
            margin-top: 0;
        }

        #briefing-content ul {
            list-style-position: inside;
            margin-bottom: 20px;
            padding-left: 20px;
        }

        #briefing-content li {
            margin-bottom: 12px;
            line-height: 1.7;
        }

        .key-themes {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #253551;
        }

        .key-themes h2 {
            margin-top: 0;
            padding-top: 0;
            border-top: none;
        }

        .footer-line {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #253551;
            font-size: 12px;
            opacity: 0.7;
            text-align: center;
        }

        .placeholder-note {
            color: #666;
            font-size: 13px;
            font-style: italic;
            padding: 30px;
            text-align: center;
            background-color: rgba(37, 53, 81, 0.03);
            border: 1px dashed #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Murdoch Capital</h1>
            <p style="font-size: 14px; letter-spacing: 1px; font-style: italic;">Morning Briefing</p>
        </div>

        <!-- BRIEFING_CONTENT_START -->
        <div id="briefing-content">
          <!-- daily briefing goes here -->
        </div>
        <!-- BRIEFING_CONTENT_END -->
    </div>
</body>
</html>
